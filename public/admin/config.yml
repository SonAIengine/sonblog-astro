# SON BLOG CMS 설정 (Sveltia CMS)
# 인증: 홈서버 OAuth 프록시(cms-auth.infoedu.co.kr) → GitHub
backend:
  name: github
  repo: SonAIengine/sonblog-astro
  branch: main
  base_url: https://cms-auth.infoedu.co.kr
  auth_endpoint: auth

site_url: https://infoedu.co.kr
display_url: https://infoedu.co.kr

# 이미지 업로드 위치 (글에서 참조)
media_folder: src/assets/images
public_folder: /src/assets/images

# 카테고리별 컬렉션. Sveltia는 nested 미지원 — 대신 folder 컬렉션이 하위폴더를
# 재귀로 읽는다(글이 전부 category/subcategory/*.md 구조라도 다 나열·편집됨).
# fields는 YAML 앵커(&postfields)로 공유.
collections:
  - name: ai
    label: "AI/ML"
    folder: src/content/posts/ai
    create: true
    extension: md
    format: frontmatter
    sortable_fields: [pubDatetime, title]
    fields: &postfields
      - { name: title, label: 제목, widget: string }
      - {
          name: pubDatetime,
          label: 발행일,
          widget: datetime,
          date_format: "YYYY-MM-DD",
          time_format: false,
          format: "YYYY-MM-DD",
          picker_utc: false,
        }
      - { name: description, label: 설명(검색/SEO 노출), widget: text }
      - { name: tags, label: 태그, widget: list, default: ["others"] }
      - {
          name: featured,
          label: 추천(홈 상단 고정),
          widget: boolean,
          required: false,
          default: false,
        }
      - {
          name: draft,
          label: 초안(비공개),
          widget: boolean,
          required: false,
          default: false,
        }
      - { name: series, label: 시리즈명(선택), widget: string, required: false }
      - {
          name: seriesOrder,
          label: 시리즈 순서(선택),
          widget: number,
          required: false,
          value_type: int,
        }
      - { name: ogImage, label: OG 이미지(선택), widget: string, required: false }
      # raw 모드 — 복잡한 마크다운(코드블록·mermaid·HTML)에서 리치텍스트 렌더가
      # 깨지는 문제 회피. 순수 마크다운으로 안전하게 편집.
      - { name: body, label: 본문, widget: markdown, modes: ["raw"] }

  - name: search-engine
    label: "검색엔진"
    folder: src/content/posts/search-engine
    create: true
    extension: md
    format: frontmatter
    sortable_fields: [pubDatetime, title]
    fields: *postfields

  - name: devops
    label: "DevOps"
    folder: src/content/posts/devops
    create: true
    extension: md
    format: frontmatter
    sortable_fields: [pubDatetime, title]
    fields: *postfields

  - name: full-stack
    label: "Full Stack"
    folder: src/content/posts/full-stack
    create: true
    extension: md
    format: frontmatter
    sortable_fields: [pubDatetime, title]
    fields: *postfields

  - name: notes
    label: "Notes"
    folder: src/content/posts/notes
    create: true
    extension: md
    format: frontmatter
    sortable_fields: [pubDatetime, title]
    fields: *postfields

  - name: portfolio
    label: "Portfolio"
    folder: src/content/posts/portfolio
    create: true
    extension: md
    format: frontmatter
    sortable_fields: [pubDatetime, title]
    fields: *postfields
