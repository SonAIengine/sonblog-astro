# SON BLOG CMS 설정 (Sveltia/Decap)
# 인증: 홈서버 OAuth 프록시(cms-auth.infoedu.co.kr) → GitHub
backend:
  name: github
  repo: SonAIengine/sonblog-astro
  branch: main
  base_url: https://cms-auth.infoedu.co.kr
  auth_endpoint: auth

site_url: https://infoedu.co.kr
display_url: https://infoedu.co.kr

# 이미지 업로드 위치 (글에서 참조)
media_folder: src/assets/images
public_folder: /src/assets/images

# 카테고리별 컬렉션 — 사이드바가 블로그 카테고리 구조를 그대로 반영.
# 각 컬렉션은 해당 폴더(+하위폴더)의 개별 .md를 재귀 나열(subfolders:false).
# fields는 YAML 앵커(&postfields)로 공유.
collections:
  - name: ai
    label: "AI/ML"
    folder: src/content/posts/ai
    create: true
    nested: { depth: 3, subfolders: false, summary: "{{title}}" }
    path: "{{dirname}}/{{slug}}"
    extension: md
    format: frontmatter
    sortable_fields: [pubDatetime, title]
    fields: &postfields
      - { name: title, label: 제목, widget: string }
      - {
          name: pubDatetime,
          label: 발행일시,
          widget: datetime,
          date_format: "YYYY-MM-DD",
          time_format: "HH:mm",
          format: "YYYY-MM-DD",
        }
      - { name: description, label: 설명(검색/SEO 노출), widget: text }
      - { name: tags, label: 태그, widget: list, default: ["others"] }
      - {
          name: featured,
          label: 추천(홈 상단 고정),
          widget: boolean,
          required: false,
          default: false,
        }
      - {
          name: draft,
          label: 초안(비공개),
          widget: boolean,
          required: false,
          default: false,
        }
      - { name: series, label: 시리즈명(선택), widget: string, required: false }
      - {
          name: seriesOrder,
          label: 시리즈 순서(선택),
          widget: number,
          required: false,
          value_type: int,
        }
      - { name: ogImage, label: OG 이미지(선택), widget: image, required: false }
      - { name: body, label: 본문, widget: markdown }

  - name: search-engine
    label: "검색엔진"
    folder: src/content/posts/search-engine
    create: true
    nested: { depth: 3, subfolders: false, summary: "{{title}}" }
    path: "{{dirname}}/{{slug}}"
    extension: md
    format: frontmatter
    sortable_fields: [pubDatetime, title]
    fields: *postfields

  - name: devops
    label: "DevOps"
    folder: src/content/posts/devops
    create: true
    nested: { depth: 3, subfolders: false, summary: "{{title}}" }
    path: "{{dirname}}/{{slug}}"
    extension: md
    format: frontmatter
    sortable_fields: [pubDatetime, title]
    fields: *postfields

  - name: full-stack
    label: "Full Stack"
    folder: src/content/posts/full-stack
    create: true
    nested: { depth: 3, subfolders: false, summary: "{{title}}" }
    path: "{{dirname}}/{{slug}}"
    extension: md
    format: frontmatter
    sortable_fields: [pubDatetime, title]
    fields: *postfields

  - name: notes
    label: "Notes"
    folder: src/content/posts/notes
    create: true
    nested: { depth: 3, subfolders: false, summary: "{{title}}" }
    path: "{{dirname}}/{{slug}}"
    extension: md
    format: frontmatter
    sortable_fields: [pubDatetime, title]
    fields: *postfields

  - name: portfolio
    label: "Portfolio"
    folder: src/content/posts/portfolio
    create: true
    nested: { depth: 3, subfolders: false, summary: "{{title}}" }
    path: "{{dirname}}/{{slug}}"
    extension: md
    format: frontmatter
    sortable_fields: [pubDatetime, title]
    fields: *postfields
