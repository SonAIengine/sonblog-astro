# SON BLOG CMS 설정 (Decap CMS)
# 인증: 홈서버 OAuth 프록시(cms-auth.infoedu.co.kr) → GitHub
backend:
  name: github
  repo: SonAIengine/sonblog-astro
  branch: main
  base_url: https://cms-auth.infoedu.co.kr
  auth_endpoint: auth

site_url: https://infoedu.co.kr
display_url: https://infoedu.co.kr

# 이미지 업로드 위치 (글에서 참조)
media_folder: src/assets/images
public_folder: /src/assets/images

# 모든 글이 category/subcategory/*.md 구조(파일별 글).
# nested + subfolders:false → 하위폴더의 개별 .md를 폴더 트리로 재귀 나열·편집.
collections:
  - name: posts
    label: 글
    label_singular: 글
    folder: src/content/posts
    create: true
    nested:
      depth: 4
      subfolders: false
      summary: "{{title}}"
    path: "{{dirname}}/{{slug}}"
    extension: md
    format: frontmatter
    sortable_fields: [pubDatetime, title]
    fields:
      - { name: title, label: 제목, widget: string }
      - {
          name: pubDatetime,
          label: 발행일,
          widget: datetime,
          date_format: "YYYY-MM-DD",
          time_format: false,
          format: "YYYY-MM-DD",
          picker_utc: false,
        }
      - { name: description, label: 설명(검색/SEO 노출), widget: text }
      - { name: tags, label: 태그, widget: list, default: ["others"] }
      - {
          name: featured,
          label: 추천(홈 상단 고정),
          widget: boolean,
          required: false,
          default: false,
        }
      - {
          name: draft,
          label: 초안(비공개),
          widget: boolean,
          required: false,
          default: false,
        }
      - { name: series, label: 시리즈명(선택), widget: string, required: false }
      - {
          name: seriesOrder,
          label: 시리즈 순서(선택),
          widget: number,
          required: false,
          value_type: int,
        }
      - {
          name: ogImage,
          label: OG 이미지(선택),
          widget: string,
          required: false,
        }
      # raw 모드 — 복잡한 마크다운(코드블록·mermaid·HTML)에서 리치텍스트 렌더 회피
      - { name: body, label: 본문, widget: markdown, modes: ["raw"] }
