services:
  app:
    image: node:22.12.0-bookworm-slim
    ports:
      - 4321:4321
    working_dir: /app
    command: >
      bash -c "
      corepack enable
      && corepack prepare pnpm@10.29.1 --activate
      && pnpm install --frozen-lockfile
      && pnpm run dev --host 0.0.0.0"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:4321').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    volumes:
      - ./:/app
      - /app/node_modules
